<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Auto Drive | Luxury Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; overflow: hidden; font-family: 'Roboto', sans-serif; background: #0a0a0a; }

        .car-container {
            height: 100vh;
            background: radial-gradient(circle at 70%, #1a1a1a 0%, #050505 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8%;
            color: #ffffff;
            position: relative;
        }

        /* Background par ek halka sa "Speed" effect */
        .car-container::before {
            content: 'SPEED';
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-size: 15rem;
            color: rgba(255, 255, 255, 0.02);
            z-index: 0;
            bottom: 10%;
            left: 5%;
        }

        .text-content { flex: 1; max-width: 600px; z-index: 1; }
        
        /* Heading in 'Orbitron' for a futuristic/racing feel */
        h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem; 
            margin-bottom: 10px; 
            letter-spacing: 2px;
            color: #00d4ff; /* Neon Blue */
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        h2 { font-size: 1.5rem; font-weight: 300; margin-bottom: 25px; color: #ccc; }

        .specs { display: flex; gap: 20px; margin-bottom: 35px; }
        .spec-item { 
            border-left: 2px solid #00d4ff; 
            padding-left: 15px;
        }
        .spec-item span { display: block; font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .spec-item b { font-size: 1.2rem; color: #fff; }

        .btn-drive {
            padding: 15px 45px;
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .btn-drive:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .image-side { 
            flex: 1; 
            display: flex; 
            justify-content: flex-end;
            z-index: 1;
        }

        /* Luxury Car Image */
        .car-image {
            width: 120%; /* Thoda bahar nikalta hua attractive lagta hai */
            transform: translateX(10%);
        }

        .car-image img {
            width: 100%;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.8));
        }
    </style>
</head>
<body>

    <div class="car-container">
        <div class="text-content">
            <h1>UNLEASH POWER</h1>
            <h2>Premium Sports Car Rentals for the Elite.</h2>
            
            <div class="specs">
                <div class="spec-item">
                    <span>Top Speed</span>
                    <b>320 KM/H</b>
                </div>
                <div class="spec-item">
                    <span>0-100 KM/H</span>
                    <b>2.9 SEC</b>
                </div>
                <div class="spec-item">
                    <span>Engine</span>
                    <b>V12 Turbo</b>
                </div>
            </div>

            <a href="#" class="btn-drive">Book Your Ride</a>
        </div>

        <div class="image-side">
            <div class="car-image">
                <img src="M12.jpg" alt="Silver Sports Car">
            </div>
        </div>
    </div>

</body>
</html>
